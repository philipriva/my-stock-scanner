- name: 自動將結果存回 GitHub 專案
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 💡 將偵測檔名改回 V2，確保對得上一舊代碼
        if ls Strong_Stocks_V2_*.txt 1> /dev/null 2>&1; then
          git add Strong_Stocks_V2_*.txt
          git commit -m "更新今日強勢股清單 (V2版)"
          git push
        else
          echo "今日未偵測到符合條件的強勢股，跳過上傳。"
        fi
